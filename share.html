
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%93%93%3C/text%3E%3C/svg%3E" />
  <title>日语表达 - 查询与分享</title>
  <style>
    /* 复用 index.html 的样式 */
    :root {
      --paper: #fdfaf3;
      --ink: #2e1d19;
      --ink-soft: rgba(46,29,25,0.72);
      --accent: #d6c1b4;
      --accent-strong: #b07a62;
      --card: rgba(255,255,255,0.72);
      --card-strong: rgba(255,255,255,0.9);
      --border: rgba(46,29,25,0.12);
      --shadow: rgba(62,39,35,.08);
      --shadow-strong: rgba(62,39,35,.16);
      --handwriting: 'Kalam', cursive;
      --nav-height: 68px;
      --page-width: 1040px;
      --page-header-height: 72px;
      --page-content-min-height: 520px;
    }

    @import url('https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap');

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--paper);
      background-image:
        radial-gradient(1200px 800px at 8% -10%, rgba(255,255,255,0.8), transparent 60%),
        radial-gradient(900px 600px at 95% 0%, rgba(255,230,214,0.6), transparent 62%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d6c1b4' fill-opacity='.13'%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      color: var(--ink);
      font-family: 'Noto Sans SC', sans-serif;
      overflow-x: hidden;
    }

    .app-layout {
      min-height: 100vh;
      padding: calc(var(--nav-height) + 1.8rem + env(safe-area-inset-top)) 1rem calc(3rem + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
    }

    .app-navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: var(--nav-height);
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(253,250,243,0.92);
      backdrop-filter: blur(14px) saturate(160%);
      border-bottom: 1px solid rgba(46,29,25,0.08);
      box-shadow: 0 6px 16px rgba(46,29,25,0.08);
      z-index: 10;
      padding: 0 1rem;
    }

    .nav-bar {
      width: 100%;
      max-width: var(--page-width);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .nav-brand {
      font-family: var(--handwriting);
      font-size: 1.1rem;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    h1 {
      font-family: var(--handwriting);
      font-size: 2rem;
      margin: 0;
      letter-spacing: 1px;
      color: var(--ink);
    }

    .page-container {
      width: 100%;
      max-width: var(--page-width);
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .page-header {
      min-height: var(--page-header-height);
      display: flex;
      align-items: center;
    }

    .page-content {
      width: 100%;
      min-height: var(--page-content-min-height);
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .nav-links {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      flex: 1;
    }

    .nav-user {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(46,29,25,0.12);
      border-radius: 999px;
      padding: 0.2rem 0.6rem;
      white-space: nowrap;
    }

    .nav-user input {
      min-height: 30px;
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 0.2rem 0.6rem;
      outline: none;
      background: rgba(255,255,255,0.85);
      color: var(--ink);
      font-size: 0.85rem;
      width: 120px;
    }

    .nav-user-display {
      font-size: 0.85rem;
      color: var(--ink-soft);
      white-space: nowrap;
    }

    .nav-link {
      color: var(--ink);
      text-decoration: none;
      border: 1px solid transparent;
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      font-size: 0.9rem;
      opacity: 0.78;
      transition: all 0.2s ease;
    }
    
    .nav-link:hover {
      opacity: 1;
      background: rgba(255,255,255,0.7);
      border-color: rgba(46,29,25,0.12);
    }

    .nav-link.active {
      opacity: 1;
      background: var(--card-strong);
      border-color: rgba(46,29,25,0.15);
    }

    @media (max-width: 760px) {
      .nav-brand {
        font-size: 0.95rem;
      }

      .nav-bar {
        gap: 0.6rem;
      }

      .nav-links {
        gap: 0.4rem;
      }

      .nav-link {
        padding: 0.3rem 0.6rem;
        font-size: 0.82rem;
      }

      .nav-user {
        padding: 0.15rem 0.4rem;
        gap: 0.3rem;
      }

      .nav-user input {
        width: 88px;
        font-size: 0.78rem;
      }

      .nav-user-display {
        font-size: 0.75rem;
      }
    }

    .glass-card {
      background: var(--card);
      backdrop-filter: blur(10px) saturate(180%);
      border: 1px solid rgba(46,29,25,0.08);
      border-radius: 18px;
      box-shadow: 0 12px 32px var(--shadow);
      padding: 1.6rem;
      width: 100%;
      margin-bottom: 1.6rem;
      box-sizing: border-box; /* Ensure padding is included in width */
    }

    .layout-container {
      display: grid;
      grid-template-columns: minmax(240px, 0.95fr) minmax(320px, 1.05fr);
      gap: 2rem;
      width: 100%; /* Ensure it takes full width of parent */
    }
    
    @media (max-width: 800px) {
      .layout-container {
        grid-template-columns: 1fr;
      }
    }

    /* 历史列表样式 */
    .history-column {
      border-right: 1px dashed rgba(0,0,0,0.1);
      padding-right: 2rem;
      min-width: 0; /* Important for flex/grid children to shrink */
    }
    
    @media (max-width: 800px) {
      .history-column {
        border-right: none;
        border-bottom: 1px dashed rgba(0,0,0,0.1);
        padding-right: 0;
        padding-bottom: 2rem;
        width: 100%;
      }
    }
    
    .history-card {
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(46,29,25,0.08);
      border-radius: 14px;
      padding: 1rem;
      margin-bottom: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      max-width: 100%;
      box-sizing: border-box;
    }
    
    .history-card:hover, .history-card.active {
      transform: translateY(-2px);
      box-shadow: 0 10px 18px rgba(46,29,25,0.08);
      background: rgba(255,255,255,0.95);
      border-color: rgba(176,122,98,0.35);
    }
    
    .history-card.active {
      background: #fff;
      border: 2px solid rgba(176,122,98,0.5);
    }
    
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.4rem;
    }
    
    .history-date { font-size: 0.8rem; color: var(--ink-soft); }
    .history-tags { display: flex; gap: 0.3rem; }
    .tag { background: rgba(214,193,180,0.35); color: var(--ink); font-size: 0.75rem; padding: 2px 6px; border-radius: 6px; }
    .history-title { margin: 0 0 0.4rem; font-size: 1.1rem; color: var(--ink); }
    .history-preview { margin: 0; font-size: 0.9rem; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* 详情与生成样式 */
    .detail-column {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      min-width: 0; /* Important for flex/grid children */
      width: 100%;
    }

    /* Make images responsive */
    #imagePreview img {
      max-width: 100%;
      height: auto;
    }
    
    .section-title {
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 0.2px;
    }

    #searchInput {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.7);
      color: var(--ink);
      transition: all 0.2s ease;
    }

    #searchInput:focus {
      border-color: rgba(176,122,98,0.4);
      box-shadow: 0 0 0 3px rgba(176,122,98,0.2);
      background: rgba(255,255,255,0.95);
    }

    textarea {
      width: 100%;
      min-height: 200px;
      font-size: 0.95rem;
      line-height: 1.6;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255,255,255,0.6);
      color: var(--ink);
      padding: 1rem;
      font-family: 'Noto Sans SC', sans-serif;
      resize: vertical;
    }
    
    textarea:focus {
      outline: none;
      border-color: rgba(176,122,98,0.4);
      background: rgba(255,255,255,0.9);
      box-shadow: 0 0 0 3px rgba(176,122,98,0.2);
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 24px;
      padding: .6rem 1.4rem;
      font-size: 1rem;
      font-weight: 700;
      transition: all .3s ease;
      position: relative;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    button:focus-visible {
      outline: 3px solid rgba(176,122,98,0.35);
      outline-offset: 2px;
    }

    .primary {
      background: var(--ink);
      color: var(--paper);
      box-shadow: 0 8px 18px rgba(46,29,25,0.18);
    }

    .secondary {
      background: rgba(255,255,255,0.6);
      color: var(--ink);
      border: 2px solid rgba(176,122,98,0.25);
    }
    .secondary:hover { background: rgba(214,193,180,0.55); }

    .image-generate {
      background: linear-gradient(45deg, #ff6b6b, #ff8e53);
      color: white;
      width: 100%;
    }
    .image-generate:hover {
      background: linear-gradient(45deg, #ff5252, #ff7b3d);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--shadow);
    }
    .image-generate:disabled {
      background: #cccccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    .success {
      background: #4caf50;
      color: white;
    }

    /* 图片预览区 */
    #imageResult {
      background: linear-gradient(135deg, #fff9d8 0%, #fff1b8 100%);
      border-radius: 12px;
      border: 1px solid rgba(176,122,98,0.18);
      padding: 1rem;
      margin-top: 1rem;
    }
    
    /* 移动端优化 */
    @media (max-width: 768px) {
      .app-layout {
        padding: calc(var(--nav-height) + 1.2rem + env(safe-area-inset-top)) 1rem calc(2rem + env(safe-area-inset-bottom));
      }

      h1 {
        font-size: 1.6rem;
        text-align: center;
      }

      .page-header {
        justify-content: center;
      }
      
      .glass-card {
        padding: 1.2rem;
        border-radius: 12px;
        backdrop-filter: blur(6px);
      }
      
      .layout-container {
        gap: 1.5rem;
      }
      
      .history-column {
        padding-right: 0;
        padding-bottom: 1.5rem;
      }
      
      .history-card {
        padding: 0.8rem;
        margin-bottom: 0.6rem;
      }
      
      .history-title {
        font-size: 1rem;
      }
      
      .history-preview {
        font-size: 0.85rem;
      }
      
      .section-title {
        font-size: 1.1rem;
        margin-bottom: 0.6rem;
      }
      
      textarea {
        min-height: 150px;
        font-size: 1rem;
        padding: 0.8rem;
      }

      #searchInput {
        font-size: 1rem;
      }
      
      button {
        padding: 0.8rem 1.2rem;
        font-size: 0.95rem;
        border-radius: 20px;
      }
      
      #imagePreview {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.5rem;
      }
      
      #imagePreview img {
        width: 120px !important;
        margin: 0 !important;
      }
    }
    
    /* 小屏手机优化 */
    @media (max-width: 480px) {
      body {
        padding: 1rem 0.8rem calc(1.2rem + env(safe-area-inset-bottom));
      }
      
      h1 {
        font-size: 1.4rem;
        margin-bottom: 1rem;
      }
      
      .glass-card {
        padding: 1rem;
        border-radius: 10px;
      }
      
      .layout-container {
        gap: 1rem;
      }
      
      .history-card {
        padding: 0.6rem;
      }
      
      .history-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.3rem;
      }
      
      .history-date {
        font-size: 0.75rem;
      }
      
      .tag {
        font-size: 0.7rem;
        padding: 1px 4px;
      }
      
      .history-title {
        font-size: 0.95rem;
      }
      
      .history-preview {
        font-size: 0.8rem;
      }
      
      #searchInput {
        min-height: 32px;
        font-size: 1rem;
      }
      
      #searchBtn {
        padding: 0.3rem 0.8rem;
        font-size: 0.85rem;
      }
      
      textarea {
        min-height: 120px;
        font-size: 1rem;
      }
      
      button {
        padding: 0.7rem 1rem;
        font-size: 0.9rem;
      }
      
      #imagePreview img {
        width: 100px !important;
      }
      
      .section-title {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }
      
      .section-title button {
        align-self: flex-end;
        padding: 0.2rem 0.6rem;
        font-size: 0.8rem;
      }
    }
    
    /* 触摸设备优化 */
    @media (hover: none) and (pointer: coarse) {
      .history-card:hover {
        transform: none;
        box-shadow: none;
      }
      
      .history-card:active {
        transform: scale(0.98);
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      }
      
      button:hover {
        transform: none;
        box-shadow: none;
      }
      
      button:active {
        transform: scale(0.98);
        box-shadow: 0 2px 8px var(--shadow);
      }
    }
    
    /* 横屏模式优化 */
    @media (max-height: 500px) and (orientation: landscape) {
      body {
        padding: 1rem 2rem;
      }
      
      h1 {
        font-size: 1.5rem;
        margin-bottom: 0.8rem;
      }
      
      .layout-container {
        grid-template-columns: 1fr 2fr;
        gap: 1.5rem;
      }
      
      .history-column {
        padding-bottom: 0;
        border-bottom: none;
      }
      
      textarea {
        min-height: 100px;
      }
    }
  </style>
</head>
<body data-page="share">
  <header class="app-navbar">
    <div id="navBar" class="nav-bar">
      <div class="nav-brand">日语表达打磨系统</div>
    </div>
  </header>

  <div class="app-layout">
    <main class="page-container">
      <div class="page-header">
        <h1>查询与分享</h1>
      </div>
      <div class="page-content">
        <div class="glass-card">
          <div class="layout-container">
            <!-- 左侧：历史记录列表 -->
            <div class="history-column">
              <div class="section-title">📜 历史记录</div>
              <div style="margin-bottom: 1rem; display: flex; gap: 0.5rem;">
                <input type="text" id="searchInput" placeholder="搜索标题..." style="flex: 1; min-height: 36px; padding: 0.4rem 0.8rem; border-radius: 18px; border: 1px solid #ddd; outline: none;">
                <button id="searchBtn" class="primary" style="padding: 0.4rem 1rem; font-size: 0.9rem;">搜索</button>
              </div>
              <div id="historyList">
                <div style="text-align:center; color:#999; padding: 2rem;">请输入标题搜索或直接点击搜索加载最近记录</div>
              </div>
              <button id="loadMoreHistoryBtn" class="secondary" style="width: 100%; margin-top: 1rem; display: none;">加载更多</button>
            </div>

            <!-- 右侧：详情与生成 -->
            <div class="detail-column" id="detailPanel" style="opacity: 0.5; pointer-events: none;">
              
              <!-- 文案生成区 -->
              <div>
                <div class="section-title">
                  <span>📝 小红书文案</span>
                  <button id="copyTextBtn" class="secondary" style="padding: 0.2rem 0.6rem; font-size: 0.8rem;">复制文案</button>
                </div>
                <textarea id="xhsContent" placeholder="选择左侧记录后自动生成..."></textarea>
                <div style="text-align: right; margin-top: 0.5rem;">
                  <small style="color: #666; cursor: pointer;" id="toggleTemplate">⚙️ 编辑模板</small>
                </div>
                <textarea id="templateEditor" style="display: none; height: 150px; margin-top: 0.5rem; font-family: monospace; font-size: 0.8rem;" placeholder="在这里编辑模板..."></textarea>
              </div>

              <!-- 图片生成区 -->
              <div>
                <div class="section-title">✨ 图片生成</div>
                <div style="margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
                  <label style="cursor: pointer; display: flex; align-items: center; gap: 0.4rem;">
                    <input type="radio" name="cardStyle" value="linear" checked> 
                    <span>Linear (极简)</span>
                  </label>
                  <label style="cursor: pointer; display: flex; align-items: center; gap: 0.4rem;">
                    <input type="radio" name="cardStyle" value="knowledge"> 
                    <span>Knowledge (知识)</span>
                  </label>
                </div>
                <button id="generateImageBtn" class="image-generate">生成分享图片</button>
                
                <div id="imageResult" style="display: none;">
                  <div id="imageStatus">正在生成...</div>
                  <div id="imageTips" style="display: none; margin-top: 0.5rem; color: #666; font-size: 0.85rem;"></div>
                  <div id="imagePreview" style="margin-top: 1rem; text-align: center;"></div>
                  <div id="saveAllCards" style="margin-top: 1rem; text-align: center;">
                    <button id="saveAllBtn" class="success" style="display: none; padding: 0.4rem 1rem;">保存所有</button>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script type="module" src="./nav.js"></script>
  <script type="module" src="./share.js"></script>
</body>
</html>
